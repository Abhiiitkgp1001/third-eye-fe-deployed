name: Sync Org Repo to Personal Repo

on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (org repo)
        uses: actions/checkout@v4
        with:
          repository: try-3rd-eye/third-eye-fe
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Nuke all branches & tags in personal repo, then sync
        env:
          PERSONAL_REPO: Abhiiitkgp1001/third-eye-fe-deployed
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git remote add personal \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/${PERSONAL_REPO}.git"

          # Fetch everything from personal repo
          git fetch personal

          # Delete all remote branches in personal repo (except HEAD/default)
          for branch in $(git branch -r | grep 'personal/' | grep -v 'HEAD' | sed 's|personal/||'); do
            git push personal --delete "$branch" || true
          done

          # Delete all remote tags in personal repo
          for tag in $(git ls-remote --tags personal | awk '{print $2}' | grep -v '{}'); do
            git push personal --delete "$tag" || true
          done

          # Force-push all branches and tags from org → personal (clean sync)
          git push personal --force --all
          git push personal --force --tags
